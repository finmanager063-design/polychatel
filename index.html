<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Смена получателя</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4f;
      --text: #e8eef5;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --accent-hover: #5ca0ff;
      --success: #34c759;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(ellipse 80% 60% at 50% -20%, #1e3a5f 0%, transparent 55%), var(--bg);
      color: var(--text);
    }
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 24px 24px 20px;
      gap: 32px;
    }
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.25rem;
      font-weight: 600;
    }
    .hint {
      margin: 0 0 20px;
      font-size: 0.875rem;
      color: var(--muted);
    }
    label {
      display: block;
      font-size: 0.8125rem;
      color: var(--muted);
      margin-bottom: 8px;
    }
    input[type="number"] {
      width: 100%;
      padding: 12px 14px;
      font-size: 1.125rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="number"]:focus {
      border-color: var(--accent);
    }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type="number"] {
      -moz-appearance: textfield;
    }
    button {
      width: 100%;
      margin-top: 16px;
      padding: 12px 16px;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover {
      background: var(--accent-hover);
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .result {
      display: none;
      margin-top: 20px;
      padding: 16px;
      text-align: center;
      font-size: 1rem;
      line-height: 1.5;
      color: var(--success);
      background: rgba(52, 199, 89, 0.12);
      border: 1px solid rgba(52, 199, 89, 0.35);
      border-radius: 10px;
    }
    .result.visible {
      display: block;
    }
    .form-wrap.hidden {
      display: none;
    }
    .banks-footer {
      width: 100%;
      max-width: 560px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .banks-caption {
      margin: 0 0 12px;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .bank-logos {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 20px 28px;
    }
    .bank-logos a {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 36px;
      min-width: 72px;
      padding: 0 4px;
      opacity: 0.88;
      transition: opacity 0.15s;
    }
    .bank-logos a:hover {
      opacity: 1;
    }
    .bank-logos img {
      max-height: 32px;
      max-width: 110px;
      width: auto;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.35));
    }
  </style>
</head>
<body>
  <div class="page">
  <div class="main">
  <div class="card">
    <h1>Смена получателя</h1>
    <p class="hint">Введите сумму и нажмите «Подтвердить».</p>

    <div class="form-wrap" id="formWrap">
      <label for="amount">Сумма, USD</label>
      <input
        type="number"
        id="amount"
        name="amount"
        min="0"
        step="0.01"
        placeholder="0.00"
        inputmode="decimal"
        autocomplete="off"
      />
      <button type="button" id="submitBtn">Подтвердить</button>
    </div>

    <div class="result" id="result" role="status" aria-live="polite">
      Смена получателя выполнена
    </div>
  </div>
  </div>

  <footer class="banks-footer">
    <p class="banks-caption">Банки Казахстана</p>
    <div class="bank-logos">
      <a href="https://kaspi.kz/" target="_blank" rel="noopener noreferrer" title="Kaspi Bank">
        <img src="logos/kaspi.svg" alt="Kaspi Bank" width="100" height="32" />
      </a>
      <a href="https://halykbank.kz/" target="_blank" rel="noopener noreferrer" title="Halyk Bank">
        <img src="logos/halyk.svg" alt="Halyk Bank" width="100" height="32" />
      </a>
      <a href="https://www.forte.kz/" target="_blank" rel="noopener noreferrer" title="ForteBank">
        <img src="logos/forte.svg" alt="ForteBank" width="64" height="32" />
      </a>
      <a href="https://www.bcc.kz/" target="_blank" rel="noopener noreferrer" title="Bank CenterCredit">
        <img src="logos/bcc.svg" alt="Bank CenterCredit" width="100" height="32" />
      </a>
      <a href="https://bankffin.kz/" target="_blank" rel="noopener noreferrer" title="Freedom Bank Kazakhstan">
        <img src="logos/freedom.svg" alt="Freedom Bank Kazakhstan" width="100" height="32" />
      </a>
    </div>
  </footer>
  </div>

  <script>
    (function () {
      var formWrap = document.getElementById("formWrap");
      var amount = document.getElementById("amount");
      var submitBtn = document.getElementById("submitBtn");
      var result = document.getElementById("result");

      function confirm() {
        var value = amount.value.trim();
        if (value === "" || Number(value) < 0 || !isFinite(Number(value))) {
          amount.focus();
          return;
        }
        formWrap.classList.add("hidden");
        result.classList.add("visible");
      }

      submitBtn.addEventListener("click", confirm);
      amount.addEventListener("keydown", function (e) {
        if (e.key === "Enter") confirm();
      });
    })();
  </script>
</body>
</html>
